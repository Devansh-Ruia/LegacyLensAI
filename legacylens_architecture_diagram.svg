<svg width="100%" viewBox="0 0 680 510">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Row 1: User input -->
  <g class="node c-gray" onclick="sendPrompt('How does LegacyLens ingest a codebase?')">
    <rect x="240" y="20" width="200" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">ZIP file or GitHub URL</text>
  </g>

  <!-- Row 2: App layer (Vercel) -->
  <g class="node c-purple" onclick="sendPrompt('What does the Next.js frontend handle in LegacyLens?')">
    <rect x="80" y="90" width="180" height="54" rx="6" stroke-width="0.5"/>
    <text class="th" x="170" y="108" text-anchor="middle" dominant-baseline="central">Next.js frontend</text>
    <text class="ts" x="170" y="128" text-anchor="middle" dominant-baseline="central">Vercel Edge</text>
  </g>
  <g class="node c-purple" onclick="sendPrompt('What API routes does LegacyLens expose?')">
    <rect x="420" y="90" width="180" height="54" rx="6" stroke-width="0.5"/>
    <text class="th" x="510" y="108" text-anchor="middle" dominant-baseline="central">API routes</text>
    <text class="ts" x="510" y="128" text-anchor="middle" dominant-baseline="central">Vercel serverless</text>
  </g>

  <!-- Row 3: Microsoft Foundry -->
  <g class="node c-teal" onclick="sendPrompt('How does Microsoft Foundry orchestrate the LegacyLens pipeline?')">
    <rect x="100" y="165" width="480" height="50" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="183" text-anchor="middle" dominant-baseline="central">Microsoft Foundry</text>
    <text class="ts" x="340" y="202" text-anchor="middle" dominant-baseline="central">Agent Framework · Azure MCP · Pipeline orchestration</text>
  </g>

  <!-- Row 4: Azure services -->
  <g class="node c-blue" onclick="sendPrompt('How does LegacyLens use GitHub Models for GPT-4o inference?')">
    <rect x="40" y="245" width="170" height="54" rx="6" stroke-width="0.5"/>
    <text class="th" x="125" y="263" text-anchor="middle" dominant-baseline="central">GitHub Models</text>
    <text class="ts" x="125" y="282" text-anchor="middle" dominant-baseline="central">GPT-4o inference</text>
  </g>
  <g class="node c-blue" onclick="sendPrompt('How does LegacyLens use Azure AI Search?')">
    <rect x="255" y="245" width="170" height="54" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="263" text-anchor="middle" dominant-baseline="central">Azure AI Search</text>
    <text class="ts" x="340" y="282" text-anchor="middle" dominant-baseline="central">Semantic indexing</text>
  </g>
  <g class="node c-blue" onclick="sendPrompt('What does Azure Blob Storage do in LegacyLens?')">
    <rect x="470" y="245" width="170" height="54" rx="6" stroke-width="0.5"/>
    <text class="th" x="555" y="263" text-anchor="middle" dominant-baseline="central">Azure Blob Storage</text>
    <text class="ts" x="555" y="282" text-anchor="middle" dominant-baseline="central">Job state storage</text>
  </g>

  <!-- Row 5: GitHub integration -->
  <g class="node c-green" onclick="sendPrompt('How does GitHub Actions integrate with LegacyLens?')">
    <rect x="80" y="335" width="180" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="170" y="355" text-anchor="middle" dominant-baseline="central">GitHub Actions</text>
  </g>
  <g class="node c-green" onclick="sendPrompt('How does GitHub Copilot assist with refactoring in LegacyLens?')">
    <rect x="420" y="335" width="180" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="510" y="355" text-anchor="middle" dominant-baseline="central">GitHub Copilot</text>
  </g>

  <!-- Row 6: Outputs -->
  <g class="node c-amber" onclick="sendPrompt('What is the Business Intent Map output in LegacyLens?')">
    <rect x="40" y="425" width="170" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="125" y="445" text-anchor="middle" dominant-baseline="central">Intent map</text>
  </g>
  <g class="node c-amber" onclick="sendPrompt('What does the LegacyLens modernization roadmap contain?')">
    <rect x="255" y="425" width="170" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="445" text-anchor="middle" dominant-baseline="central">Roadmap</text>
  </g>
  <g class="node c-amber" onclick="sendPrompt('What does LegacyLens generate for refactored modules?')">
    <rect x="470" y="425" width="170" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="555" y="445" text-anchor="middle" dominant-baseline="central">Code + tests</text>
  </g>

  <!-- Arrows: Input → app layer -->
  <path d="M340,60 L340,75 L170,75 L170,90" fill="none" class="arr" marker-end="url(#arrow)"/>
  <path d="M340,60 L340,75 L510,75 L510,90" fill="none" class="arr" marker-end="url(#arrow)"/>

  <!-- Arrows: App → Foundry -->
  <path d="M170,144 L170,165" fill="none" class="arr" marker-end="url(#arrow)"/>
  <path d="M510,144 L510,165" fill="none" class="arr" marker-end="url(#arrow)"/>

  <!-- Arrows: Foundry → Azure services -->
  <path d="M200,215 L200,233 L125,233 L125,245" fill="none" class="arr" marker-end="url(#arrow)"/>
  <path d="M340,215 L340,245" fill="none" class="arr" marker-end="url(#arrow)"/>
  <path d="M480,215 L480,233 L555,233 L555,245" fill="none" class="arr" marker-end="url(#arrow)"/>

  <!-- Arrows: Services → GitHub layer -->
  <path d="M125,299 L125,318 L170,318 L170,335" fill="none" class="arr" marker-end="url(#arrow)"/>
  <path d="M555,299 L555,318 L510,318 L510,335" fill="none" class="arr" marker-end="url(#arrow)"/>

  <!-- Arrows: → Outputs -->
  <path d="M170,375 L170,425" fill="none" class="arr" marker-end="url(#arrow)"/>
  <path d="M340,299 L340,425" fill="none" class="arr" marker-end="url(#arrow)"/>
  <path d="M510,375 L510,395 L555,395 L555,425" fill="none" class="arr" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="484" width="12" height="12" rx="2" class="c-purple" stroke-width="0"/>
  <text class="ts" x="58" y="493" dominant-baseline="central">Application</text>
  <rect x="148" y="484" width="12" height="12" rx="2" class="c-teal" stroke-width="0"/>
  <text class="ts" x="166" y="493" dominant-baseline="central">Orchestration</text>
  <rect x="272" y="484" width="12" height="12" rx="2" class="c-blue" stroke-width="0"/>
  <text class="ts" x="290" y="493" dominant-baseline="central">Azure services</text>
  <rect x="392" y="484" width="12" height="12" rx="2" class="c-green" stroke-width="0"/>
  <text class="ts" x="410" y="493" dominant-baseline="central">GitHub</text>
  <rect x="470" y="484" width="12" height="12" rx="2" class="c-amber" stroke-width="0"/>
  <text class="ts" x="488" y="493" dominant-baseline="central">Output</text>
</svg>